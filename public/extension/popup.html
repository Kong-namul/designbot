<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design QA Inspector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 340px; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; font-size: 13px; }
    .header { background: linear-gradient(135deg, #6366f1, #0891b2); padding: 14px 16px; display: flex; align-items: center; gap: 10px; }
    .header h1 { font-size: 15px; font-weight: 700; color: #fff; }
    .header .badge { background: rgba(255,255,255,0.2); color: #fff; font-size: 10px; padding: 2px 8px; border-radius: 99px; }
    .section { padding: 12px 16px; border-bottom: 1px solid #1e293b; }
    .label { font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
    .url-input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 7px 10px; color: #e2e8f0; font-size: 12px; outline: none; }
    .url-input:focus { border-color: #6366f1; }
    .toggle-btn { width: 100%; padding: 10px; border-radius: 8px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .toggle-btn.off { background: #6366f1; color: #fff; }
    .toggle-btn.on { background: #22c55e; color: #fff; }
    .el-card { background: #1e293b; border-radius: 8px; padding: 12px; margin-top: 8px; }
    .el-selector { color: #818cf8; font-family: monospace; font-size: 12px; font-weight: 700; margin-bottom: 8px; }
    .props { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .prop { background: #0f172a; border-radius: 6px; padding: 6px 8px; }
    .prop-name { font-size: 10px; color: #64748b; margin-bottom: 2px; }
    .prop-val { font-family: monospace; font-size: 11px; color: #fbbf24; }
    .prop-val.green { color: #34d399; }
    .prop-val.blue { color: #60a5fa; }
    .prop-val.pink { color: #f472b6; }
    .spacing-note { background: #0c1a2e; border: 1px solid #1d4ed8; border-radius: 6px; padding: 8px 10px; margin-top: 8px; font-size: 11px; color: #93c5fd; line-height: 1.6; }
    .action-btns { display: flex; gap: 8px; margin-top: 10px; }
    .btn { flex: 1; padding: 8px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; }
    .btn-send { background: #6366f1; color: #fff; }
    .btn-copy { background: #1e293b; color: #94a3b8; border: 1px solid #334155; }
    .btn:hover { opacity: 0.85; }
    .empty { text-align: center; padding: 24px 16px; color: #475569; }
    .empty .icon { font-size: 32px; margin-bottom: 8px; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #64748b; margin-top: 6px; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #64748b; }
    .dot.active { background: #22c55e; }
    .figma-row { display: flex; gap: 6px; align-items: center; margin-top: 6px; }
    .figma-val { font-family: monospace; font-size: 11px; background: #0f172a; padding: 3px 8px; border-radius: 4px; color: #a78bfa; }
    .diff-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 700; }
    .diff-ok { background: #14532d; color: #4ade80; }
    .diff-warn { background: #7c2d12; color: #fb923c; }
    .diff-err { background: #450a0a; color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <span style="font-size:20px">🔬</span>
    <div>
      <h1>Design QA Inspector</h1>
      <div class="badge">margin/padding 자동 보정</div>
    </div>
  </div>

  <div class="section">
    <div class="label">Design QA 앱 URL</div>
    <input id="qaUrl" class="url-input" value="http://localhost:3000" placeholder="http://localhost:3000" />
  </div>

  <div class="section">
    <button id="toggleBtn" class="toggle-btn off">🔍 검사 모드 시작</button>
    <div class="status">
      <div id="dot" class="dot"></div>
      <span id="statusText">비활성화</span>
    </div>
  </div>

  <div id="elSection" class="section" style="display:none">
    <div class="label">선택된 요소</div>
    <div class="el-card">
      <div id="elSelector" class="el-selector"></div>
      <div class="props" id="propsGrid"></div>
      <div id="spacingNote" class="spacing-note" style="display:none"></div>
      <div id="figmaCompare" style="display:none">
        <div class="label" style="margin-top:8px">Figma 인라인 기준 추정</div>
        <div id="figmaVals"></div>
      </div>
      <div class="action-btns">
        <button class="btn btn-send" id="sendBtn">📤 앱에 이슈 전송</button>
        <button class="btn btn-copy" id="copyBtn">📋 복사</button>
      </div>
    </div>
  </div>

  <div id="emptySection" class="empty">
    <div class="icon">🖱️</div>
    <div>검사 모드를 시작하고<br>페이지 요소를 클릭하세요</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
